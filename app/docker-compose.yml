services:

  web:
    image: nginx:latest
    container_name: web

    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"

    networks:
      - proxy

networks:
  proxy:
    external: true
